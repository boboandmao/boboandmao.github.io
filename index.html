<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PT COUNTER</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        text-align: center;
        background: #1e293b;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    h1 {
        margin-bottom: 20px;
    }

    #timer {
        font-size: 2em;
        letter-spacing: 2px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>PT COUNTER!!</h1>
    <div id="timer">Loading...</div>
</div>

<script>
const startDate = new Date("January 31, 2026 19:46:00");

function updateTimer() {
    const now = new Date();
    let diff = now - startDate;

    if (diff < 0) {
        document.getElementById("timer").textContent = "The date hasn't happened yet.";
        return;
    }

    const seconds = Math.floor(diff / 1000);
    const days = Math.floor(seconds / (3600 * 24));
    const hours = Math.floor((seconds % (3600 * 24)) / 3600);
    const minutes = Math.floor((seconds % 3600) / 60);
    const secs = seconds % 60;

    document.getElementById("timer").textContent =
        days + " days, " +
        hours + " hours, " +
        minutes + " minutes, " +
        secs + " seconds";
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
